<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Glassmorphism Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }
        
        .glass-input:focus {
            border-color: theme('colors.tertiary-fixed-dim');
            box-shadow: 0 0 15px rgba(76, 215, 246, 0.2);
            background: rgba(255, 255, 255, 0.7);
        }

        /* Animated Background Gradients */
        .bg-gradient-animated {
            background: linear-gradient(-45deg, #f9f9ff, #e9ddff, #adc6ff, #ffffff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Animation for Orbs */
        .float-slow {
            animation: float 8s ease-in-out infinite;
        }
        .float-slower {
            animation: float 12s ease-in-out infinite reverse;
        }
        
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
    </style>

<body class="bg-gradient-animated text-on-surface min-h-screen flex items-center justify-center overflow-hidden relative selection:bg-primary selection:text-white">
<!-- Decorative Background Elements -->
<div class="absolute inset-0 pointer-events-none overflow-hidden z-0">

</div>

<!-- Glass Card -->
<div class="glass-panel rounded-[32px] p-8 md:p-10 w-full flex flex-col items-center">
<!-- Brand / Logo Area -->
<div class="mb-8 flex flex-col items-center text-center">
<div class="w-24 h-24 mb-4 relative drop-shadow-[0_10px_20px_rgba(0,88,190,0.15)]">

<h1 class="font-headline-lg text-headline-lg md:font-headline-xl md:text-headline-xl text-primary font-bold tracking-tight">
                    ELRAWDA

<p class="font-body-md text-body-md text-on-surface-variant mt-2">
                    Secure Wealth Management

<!-- Login Form -->
<form action="#" class="w-full space-y-5" method="POST">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md text-on-surface pl-1" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="glass-input w-full rounded-[24px] pl-11 pr-4 py-3.5 font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-0" id="email" name="email" placeholder="name@family.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md text-on-surface pl-1" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="glass-input w-full rounded-[24px] pl-11 pr-11 py-3.5 font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-0" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->

<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline/50 bg-white/50 text-primary focus:ring-primary focus:ring-offset-0 transition-colors cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-label-sm text-label-sm text-on-surface-variant cursor-pointer" for="remember-me">
                            Remember me
                        </label>
</div>
<div class="text-sm">
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed-variant transition-colors hover:underline underline-offset-2" href="#">
                            Forgot password?
                        </a>
</div>
</div>

<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
